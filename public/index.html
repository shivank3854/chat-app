<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* LOGIN SCREEN */
    #login {
      background: #16213e;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #login h2 {
      color: #e94560;
      margin-bottom: 20px;
      font-size: 22px;
    }

    #login input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #0f3460;
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
      outline: none;
    }

    #login button {
      width: 100%;
      padding: 12px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    #login button:hover {
      background: #c73652;
    }

    /* CHAT SCREEN */
    #chat {
      display: none;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #messages li {
      background: #0f3460;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    #messages li span {
      color: #e94560;
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .input-area {
      display: flex;
      padding: 15px;
      gap: 10px;
      background: #0f3460;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #16213e;
      color: white;
      font-size: 15px;
      outline: none;
    }

    .input-area button {
      padding: 12px 20px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .input-area button:hover {
      background: #c73652;
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <!-- LOGIN SCREEN -->
<div id="login">
  <h2 id="formTitle">Welcome Back 👋</h2>

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <input id="loginEmail" type="email" placeholder="Email..." />
    <input id="loginPassword" type="password" placeholder="Password..." />
    <button onclick="loginUser()">Login</button>
    <p style="color:#aaa; margin-top:15px; font-size:14px;">
      Don't have an account? 
      <span onclick="showRegister()" style="color:#e94560; cursor:pointer;">Register</span>
    </p>
  </div>

  <!-- REGISTER FORM -->
  <div id="registerForm" style="display:none">
    <input id="registerUsername" type="text" placeholder="Username..." />
    <input id="registerEmail" type="email" placeholder="Email..." />
    <input id="registerPassword" type="password" placeholder="Password..." />
    <button onclick="registerUser()">Register</button>
    <p style="color:#aaa; margin-top:15px; font-size:14px;">
      Already have an account? 
      <span onclick="showLogin()" style="color:#e94560; cursor:pointer;">Login</span>
    </p>
  </div>

  <p id="authMessage" style="color:#e94560; margin-top:10px; font-size:14px;"></p>
</div>

  <!-- CHAT SCREEN -->
  <div id="chat">
    <div style="display:flex; height:90vh; width:800px; background:#16213e; border-radius:12px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">

      <!-- SIDEBAR -->
      <div style="width:250px; background:#0f3460; display:flex; flex-direction:column;">
        <div style="padding:20px; background:#e94560; color:white; font-weight:bold; font-size:16px;">
          💬 Chat App
        </div>
        <div style="padding:15px; color:#e94560; font-weight:bold; font-size:13px;">CHATS</div>
        <ul id="usersList" style="list-style:none; padding:0; margin:0; flex:1; overflow-y:auto;"></ul>
        <div style="padding:15px; border-top:1px solid #1a1a2e;">
          <button onclick="switchToGlobal()" style="width:100%; padding:10px; background:#e94560; color:white; border:none; border-radius:8px; cursor:pointer;">🌐 Global Chat</button>
          <button onclick="logout()" style="width:100%; padding:10px; background:transparent; color:#aaa; border:1px solid #aaa; border-radius:8px; cursor:pointer; margin-top:8px;">Logout</button>
        </div>
      </div>

      <!-- CHAT AREA -->
      <div style="flex:1; display:flex; flex-direction:column;">
        <div style="padding:15px 20px; background:#1a1a2e; color:white; font-weight:bold; font-size:15px;" id="chatHeader">
          🌐 Global Chat
        </div>
        <ul id="messages" style="flex:1; overflow-y:auto; padding:20px; list-style:none; display:flex; flex-direction:column; gap:10px;"></ul>
        <div id="typingIndicator" style="padding:0 20px 8px; color:#aaa; font-size:13px; font-style:italic; height:24px;"></div>
        <div class="input-area">
          <input id="messageInput" type="text" placeholder="Type a message..." />
          <label for="fileInput" style="cursor:pointer; background:#0f3460; color:white; padding:12px 15px; border-radius:8px; font-size:15px;">📎</label>
          <input id="fileInput" type="file" style="display:none" onchange="sendFile()" accept="image/*,.pdf,.txt"/>
          <button onclick="sendMessage()">Send</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
let username = ''
let currentRoom = 'global'
let currentChatUser = null
let conversations = []
let onlineUsersList = []

// check if token already saved
window.onload = () => {
  const token = localStorage.getItem('token')
  const savedUsername = localStorage.getItem('username')
  if (token && savedUsername) {
    username = savedUsername
    document.getElementById('login').style.display = 'none'
    document.getElementById('chat').style.display = 'flex'
    socket.emit('user_join', username)
  }
}

function showRegister() {
  document.getElementById('loginForm').style.display = 'none'
  document.getElementById('registerForm').style.display = 'block'
  document.getElementById('formTitle').textContent = 'Create Account 🚀'
  document.getElementById('authMessage').textContent = ''
}

function showLogin() {
  document.getElementById('registerForm').style.display = 'none'
  document.getElementById('loginForm').style.display = 'block'
  document.getElementById('formTitle').textContent = 'Welcome Back 👋'
  document.getElementById('authMessage').textContent = ''
}

async function registerUser() {
  console.log('Registering user...')
  const username_val = document.getElementById('registerUsername').value
  const email = document.getElementById('registerEmail').value
  const password = document.getElementById('registerPassword').value

  if (!username_val || !email || !password) {
    document.getElementById('authMessage').textContent = 'Please fill all fields!'
    return
  }

  const response = await fetch('/auth/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: username_val, email, password })
  })

  const data = await response.json()

  if (response.ok) {
    document.getElementById('authMessage').style.color = '#4caf50'
    document.getElementById('authMessage').textContent = 'Registered! Please login.'
    showLogin()
  } else {
    document.getElementById('authMessage').style.color = '#e94560'
    document.getElementById('authMessage').textContent = data.message
  }
}

async function loginUser() {
  const email = document.getElementById('loginEmail').value
  const password = document.getElementById('loginPassword').value

  if (!email || !password) {
    document.getElementById('authMessage').textContent = 'Please fill all fields!'
    return
  }

  const response = await fetch('/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  })

  const data = await response.json()

  if (response.ok) {
    localStorage.setItem('token', data.token)
    localStorage.setItem('username', data.username)
    username = data.username
    document.getElementById('login').style.display = 'none'
    document.getElementById('chat').style.display = 'flex'
    socket.emit('user_join', username)
  } else {
    document.getElementById('authMessage').style.color = '#e94560'
    document.getElementById('authMessage').textContent = data.message
  }
}

// load conversations from DB
socket.on('load_conversations', (convs) => {
  conversations = convs
  renderSidebar()
})

// update online users
socket.on('online_users', (users) => {
  onlineUsersList = users
  renderSidebar()
})

function renderSidebar() {
  const ul = document.getElementById('usersList')
  ul.innerHTML = ''

  conversations.forEach(conv => {
    const otherUser = conv.participants.find(p => p !== username)
    if (!otherUser) return
    const isOnline = onlineUsersList.includes(otherUser)

    const li = document.createElement('li')
    li.style.cssText = 'padding:12px 15px; color:white; cursor:pointer; border-bottom:1px solid #1a1a2e; display:flex; flex-direction:column; gap:4px;'
    li.innerHTML = `
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:8px; height:8px; border-radius:50%; background:${isOnline ? '#4caf50' : '#aaa'}; display:inline-block;"></span>
        <span style="font-weight:bold;">${otherUser}</span>
      </div>
      <div style="font-size:12px; color:#aaa; padding-left:16px;">${conv.lastMessage || 'No messages yet'}</div>
    `
    li.onmouseover = () => li.style.background = '#1a1a2e'
    li.onmouseout = () => li.style.background = 'transparent'
    li.onclick = () => startPrivateChat(otherUser)
    ul.appendChild(li)
  })

  onlineUsersList.forEach(user => {
    if (user === username) return
    const alreadyShown = conversations.some(c => c.participants.includes(user))
    if (alreadyShown) return

    const li = document.createElement('li')
    li.style.cssText = 'padding:12px 15px; color:white; cursor:pointer; border-bottom:1px solid #1a1a2e;'
    li.innerHTML = `
      <div style="display:flex; align-items:center; gap:8px;">
        <span style="width:8px; height:8px; border-radius:50%; background:#4caf50; display:inline-block;"></span>
        <span>${user}</span>
      </div>
    `
    li.onmouseover = () => li.style.background = '#1a1a2e'
    li.onmouseout = () => li.style.background = 'transparent'
    li.onclick = () => startPrivateChat(user)
    ul.appendChild(li)
  })
}

function startPrivateChat(targetUser) {
  currentChatUser = targetUser
  const roomId = [username, targetUser].sort().join('_')
  currentRoom = roomId
  socket.emit('join_private_room', { roomId, targetUser })
  document.getElementById('chatHeader').textContent = `🔒 Private chat with ${targetUser}`
  document.getElementById('messages').innerHTML = ''
}

function switchToGlobal() {
  currentRoom = 'global'
  currentChatUser = null
  document.getElementById('chatHeader').textContent = '🌐 Global Chat'
  document.getElementById('messages').innerHTML = ''
  socket.emit('get_global_messages')
}

function sendMessage() {
  const input = document.getElementById('messageInput')
  if (!input.value) return
  socket.emit('send_message', {
    text: input.value,
    username: username,
    room: currentRoom
  })
  input.value = ''
}

// Enter key works on both login and chat
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    if (document.getElementById('chat').style.display === 'flex') {
      sendMessage()
    } else {
      const registerVisible = document.getElementById('registerForm').style.display === 'block'
      if (registerVisible) {
        registerUser()
      } else {
        loginUser()
      }
    }
  }
})

// typing indicator
let typingTimeout
document.getElementById('messageInput').addEventListener('input', () => {
  socket.emit('typing', { username, room: currentRoom })
  clearTimeout(typingTimeout)
  typingTimeout = setTimeout(() => {
    socket.emit('stop_typing', { room: currentRoom })
  }, 1000)
})

socket.on('typing', (data) => {
  document.getElementById('typingIndicator').textContent = `${data.username} is typing...`
})

socket.on('stop_typing', () => {
  document.getElementById('typingIndicator').textContent = ''
})

socket.on('load_messages', (messages) => {
  document.getElementById('messages').innerHTML = ''
  messages.forEach(msg => addMessage(msg.username, msg.text, msg.fileUrl, msg.fileType))
})

socket.on('receive_message', (data) => {
  addMessage(data.username, data.text, data.fileUrl, data.fileType)
})

function addMessage(user, text, fileUrl, fileType) {
  const li = document.createElement('li')
  let content = `<span>${user}</span>`
  if (text) content += `${text}`
  if (fileUrl) {
    if (fileType && fileType.startsWith('image/')) {
      content += `<br><img src="${fileUrl}" style="max-width:200px; border-radius:8px; margin-top:8px;" />`
    } else {
      content += `<br><a href="${fileUrl}" target="_blank" style="color:#e94560;">📄 ${fileUrl.split('/').pop()}</a>`
    }
  }
  li.innerHTML = content
  document.getElementById('messages').appendChild(li)
  const messages = document.getElementById('messages')
  messages.scrollTop = messages.scrollHeight
}

function logout() {
  localStorage.removeItem('token')
  localStorage.removeItem('username')
  username = ''
  currentRoom = 'global'
  currentChatUser = null
  conversations = []
  document.getElementById('chat').style.display = 'none'
  document.getElementById('login').style.display = 'block'
  document.getElementById('messages').innerHTML = ''
  document.getElementById('usersList').innerHTML = ''
}

async function sendFile() {
  const fileInput = document.getElementById('fileInput')
  const file = fileInput.files[0]
  if (!file) return

  const formData = new FormData()
  formData.append('file', file)

  const response = await fetch('/upload', {
    method: 'POST',
    body: formData
  })

  const data = await response.json()

  socket.emit('send_message', {
    username: username,
    text: '',
    fileUrl: data.url,
    fileName: data.originalname,
    fileType: data.mimetype,
    room: currentRoom
  })

  fileInput.value = ''
}
  </script>
</body>
</html>
