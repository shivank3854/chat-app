<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      background: #1a1a2e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* LOGIN SCREEN */
    #login {
      background: #16213e;
      padding: 40px;
      border-radius: 12px;
      text-align: center;
      width: 350px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #login h2 {
      color: #e94560;
      margin-bottom: 20px;
      font-size: 22px;
    }

    #login input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #0f3460;
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
      outline: none;
    }

    #login button {
      width: 100%;
      padding: 12px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    #login button:hover {
      background: #c73652;
    }

    /* CHAT SCREEN */
    #chat {
      display: none;
      flex-direction: column;
      width: 450px;
      height: 90vh;
      background: #16213e;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    #chat h1 {
      background: #e94560;
      color: white;
      padding: 20px;
      font-size: 20px;
      text-align: center;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #messages li {
      background: #0f3460;
      color: white;
      padding: 10px 15px;
      border-radius: 8px;
      max-width: 80%;
      word-wrap: break-word;
    }

    #messages li span {
      color: #e94560;
      font-weight: bold;
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    .input-area {
      display: flex;
      padding: 15px;
      gap: 10px;
      background: #0f3460;
    }

    .input-area input {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: none;
      background: #16213e;
      color: white;
      font-size: 15px;
      outline: none;
    }

    .input-area button {
      padding: 12px 20px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 15px;
    }

    .input-area button:hover {
      background: #c73652;
    }
  </style>
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="login">
    <h2>Join Chat 💬</h2>
    <input id="usernameInput" type="text" placeholder="Enter your name..." />
    <button onclick="joinChat()">Join Now</button>
  </div>

  <!-- CHAT SCREEN -->
  <div id="chat">
  <div style="background:#e94560; padding:20px; display:flex; justify-content:space-between; align-items:center;">
    <h1 style="color:white; font-size:20px;">💬 Chat App</h1>
    <button onclick="logout()" style="background:white; color:#e94560; border:none; padding:8px 15px; border-radius:8px; cursor:pointer; font-weight:bold;">Logout</button>
  </div>
  <ul id="messages"></ul>
  <div class="input-area">
    <input id="messageInput" type="text" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

  <script src="/socket.io/socket.io.js"></script>
  <script>
    const socket = io()
let username = ''

// check if username already saved
window.onload = () => {
  const savedUsername = localStorage.getItem('username')
  if (savedUsername) {
    username = savedUsername
    document.getElementById('login').style.display = 'none'
    document.getElementById('chat').style.display = 'flex'
  }
}

function joinChat() {
  username = document.getElementById('usernameInput').value
  if (!username) return
  localStorage.setItem('username', username)
  document.getElementById('login').style.display = 'none'
  document.getElementById('chat').style.display = 'flex'
}

function sendMessage() {
  const input = document.getElementById('messageInput')
  if (!input.value) return
  socket.emit('send_message', {
    text: input.value,
    username: username
  })
  input.value = ''
}

// Enter key works on both login and chat
document.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') {
    if (document.getElementById('chat').style.display === 'flex') {
      sendMessage()
    } else {
      joinChat()
    }
  }
})

socket.on('load_messages', (messages) => {
  messages.forEach(msg => addMessage(msg.username, msg.text))
})

socket.on('receive_message', (data) => {
  addMessage(data.username, data.text)
})

function addMessage(username, text) {
  const li = document.createElement('li')
  li.innerHTML = `<span>${username}</span>${text}`
  document.getElementById('messages').appendChild(li)
  const messages = document.getElementById('messages')
  messages.scrollTop = messages.scrollHeight
}
function logout() {
  localStorage.removeItem('username')
  username = ''
  document.getElementById('chat').style.display = 'none'
  document.getElementById('login').style.display = 'block'
  document.getElementById('messages').innerHTML = ''
}
 </script>
</body>
</html>
